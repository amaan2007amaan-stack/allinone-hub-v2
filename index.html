<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllInOne Hub | Professional Tools Suite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background: #f9f9f9; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #fff; border-right: 1px solid #e5e7eb; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 30px; color: #000; }
        .nav-link { padding: 12px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; transition: 0.2s; color: #4b5563; }
        .nav-link:hover { background: #f3f4f6; color: #2563eb; }
        
        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .hero { background: #fff; padding: 40px; border-radius: 16px; border: 1px solid #e5e7eb; margin-bottom: 30px; }
        .search-bar { width: 100%; max-width: 600px; padding: 15px; border-radius: 30px; border: 1px solid #d1d5db; margin-top: 15px; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .tool-card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb; transition: 0.3s; }
        .tool-card:hover { transform: translateY(-5px); border-color: #2563eb; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">AllInOne Hub</div>
        <div class="nav-link">🏠 Home</div>
        <div class="nav-link">📂 PDF Tools</div>
        <div class="nav-link">🖼 Image Tools</div>
        <div class="nav-link">🛠 Developer Tools</div>
    </div>
    
    <main class="main">
        <div class="hero">
            <h1>All-In-One Toolkit</h1>
            <p>Professional grade tools for every task.</p>
            <input type="text" class="search-bar" placeholder="Search 100+ tools (e.g. PDF Merge)...">
        </div>
        
        <div class="grid">
            <div class="tool-card"><h3>PDF Merge</h3><p>Combine multiple PDFs.</p></div>
            <div class="tool-card"><h3>Image Resizer</h3><p>Change dimensions fast.</p></div>
            <div class="tool-card"><h3>JSON Formatter</h3><p>Beautify code easily.</p></div>
        </div>
    </main>
</body>
</html>
